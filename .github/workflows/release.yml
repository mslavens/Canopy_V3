name: Build & Package Canopy

on:
  # This allows you to manually trigger the build from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write # Required to allow the Action to create a Release

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Using a modern Go version
          cache-dependency-path: 'canopy-core/go.sum'

      - name: 🛡️ Install Garble (Obfuscator)
        run: |
          go install mvdan.cc/garble@latest

      - name: � Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Build Cross-Platform Go Backend
        working-directory: ./canopy-core
        run: |
          chmod +x build.sh
          ./build.sh all

      - name: 📦 Install UI Dependencies & Package Electron
        working-directory: ./canopy-ui
        run: |
          npm install
          npm run package -- -mwl

      - name: 🚀 Upload Installers as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Canopy-Installers
          path: |
            canopy-ui/dist-electron/*.dmg
            canopy-ui/dist-electron/*.exe
            canopy-ui/dist-electron/*.AppImage
            canopy-ui/dist-electron/*.zip

      - name: 📢 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Canopy Release ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            canopy-ui/dist-electron/*.dmg
            canopy-ui/dist-electron/*.exe
            canopy-ui/dist-electron/*.AppImage
            canopy-ui/dist-electron/*.zip